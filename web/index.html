<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriftMap</title>
    
    <!-- maplibre css -->
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/DriftMap.webp">
    
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="map"></div>
    <div class="sidebar">
        <div class="header-container">
            <img class="logo" src="images/DriftMap.webp">
            <span class="title-text">DriftMap</span>
        </div>
        <div class="release-display-container">
            <span class="release-text">Release Location:</span>
            <span class="lat-text">Latitude:</span>
            <span class="lon-text">Longitude:</span>
            <input type="text" class="lat-field" value="N/A">
            <input type="text" class="lon-field" value="N/A">

        </div>
        <div class="simulation-btn-container">
            <button id="start-simulation" class="btn-primary">Start Simulation</button>
            <button id="stop-simulation" class="btn-primary">Stop Simulation</button>
            <button id="resume-simulation" class="btn-primary">Resume Simulation</button>
            <button id="reset-simulation" class="btn-primary">
                <img class = "reset-btn-img" src="images/ResetBtn.webp">
            </button>
        </div>

        <div class="simulation-info">
            <span>Day:</span>
            <span id="current-day">0.0</span>
        </div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <script type="module" src="preloader.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
